# Render Blueprint — despliega API+dashboard y PostgreSQL juntos.
# En Render: New -> Blueprint -> selecciona este repo.
services:
  - type: web
    name: protactics
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: protactics-db
          property: connectionString

databases:
  - name: protactics-db
    plan: free
    # Render expira las bases gratuitas a los 90 días; sube de plan para producción.
