<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — PROTACTICS</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f; --panel:#0b1120; --border:#1a2d4a;
  --accent:#00e5ff; --accent3:#39ff14; --accent4:#ffd700; --danger:#ff5a5a;
  --text:#c8d8e8; --dim:#4a6580;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,229,255,.10),transparent 60%);}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

.brand{display:flex;align-items:center;gap:.7rem;margin-bottom:1.6rem;}
.brand svg{width:38px;height:38px;}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:var(--accent);text-shadow:0 0 18px rgba(0,229,255,.4);line-height:1;}
.brand h1 span{display:block;font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:.2em;margin-top:3px;}
.brand .gold{color:var(--accent4);}

.card{width:100%;max-width:400px;background:linear-gradient(160deg,rgba(11,17,32,.96),rgba(7,13,25,.9));
  border:1px solid var(--border);border-radius:14px;padding:2.2rem;position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5);}
.card::before{content:'';position:absolute;left:0;top:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;color:#eaf6ff;margin-bottom:.3rem;}
.card .sub{font-size:.82rem;color:var(--dim);margin-bottom:1.6rem;}

label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);margin:1rem 0 .4rem;}
input{width:100%;background:#060b15;border:1px solid var(--border);border-radius:8px;padding:.75rem .9rem;
  color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:.95rem;transition:all .18s;}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.12);}
input.invalid{border-color:var(--danger);}
.field-err{color:var(--danger);font-size:.72rem;margin-top:.35rem;min-height:.9rem;font-weight:300;}

.btn-submit{width:100%;margin-top:1.4rem;background:linear-gradient(135deg,var(--accent),#0bb5cc);color:#02151b;
  font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
  border:none;border-radius:8px;padding:.85rem;cursor:pointer;transition:all .18s;box-shadow:0 0 22px rgba(0,229,255,.25);
  display:flex;align-items:center;justify-content:center;gap:.6rem;}
.btn-submit:hover:not(:disabled){box-shadow:0 0 32px rgba(0,229,255,.5);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.spinner{width:14px;height:14px;border:2px solid rgba(2,21,27,.3);border-top-color:#02151b;border-radius:50%;
  animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

.form-err{background:rgba(255,90,90,.08);border:1px solid rgba(255,90,90,.35);color:#ffb3b3;
  border-radius:8px;padding:.7rem .9rem;font-size:.82rem;margin-bottom:1rem;display:none;}
.form-err.show{display:block;}

.alt{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--dim);}
.back{margin-top:1.3rem;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.1em;}
.back a{color:var(--dim);}
</style>
</head>
<body>

<div class="brand">
  <svg viewBox="0 0 34 34" fill="none">
    <circle cx="17" cy="17" r="15" stroke="#00e5ff" stroke-width="1" opacity=".3"/>
    <circle cx="17" cy="17" r="9"  stroke="#00e5ff" stroke-width="1" opacity=".5"/>
    <circle cx="17" cy="17" r="3.5" stroke="#00e5ff" stroke-width="1"/>
    <path d="M17 17 L30 8" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity=".9">
      <animateTransform attributeName="transform" type="rotate" from="0 17 17" to="360 17 17" dur="4s" repeatCount="indefinite"/>
    </path>
    <circle cx="17" cy="17" r="2" fill="#00e5ff"/>
  </svg>
  <h1>PROTACTICS <span class="gold">SISTEMA ESCÁNER PORTUARIO</span></h1>
</div>

<div class="card">
  <h2>Iniciar sesión</h2>
  <div class="sub">Accede al tablero de control operacional</div>

  <div class="form-err" id="formErr"></div>

  <form id="loginForm" novalidate>
    <label for="email">Correo electrónico</label>
    <input id="email" name="email" type="email" autocomplete="username" placeholder="tucorreo@dominio.com" required>
    <div class="field-err" id="emailErr"></div>

    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
    <div class="field-err" id="passwordErr"></div>

    <button class="btn-submit" id="submitBtn" type="submit">
      <span class="spinner" id="spinner"></span>
      <span id="btnLabel">Entrar</span>
    </button>
  </form>

  <div class="alt">¿No tienes cuenta? <a href="/register">Regístrate</a></div>
</div>

<div class="back"><a href="/">← Volver al inicio</a></div>

<script>
// Sitio privado: oculta el enlace de registro si está deshabilitado.
fetch('/api/config')
  .then(r => r.ok ? r.json() : null)
  .then(c => {
    if (c && c.registration_enabled) return;
    document.querySelectorAll('a[href="/register"]')
      .forEach(e => { (e.closest('.alt') || e).style.display = 'none'; });
  })
  .catch(()=>{});
</script>

<script>
const form = document.getElementById('loginForm');
const emailEl = document.getElementById('email');
const passEl  = document.getElementById('password');
const emailErr = document.getElementById('emailErr');
const passErr  = document.getElementById('passwordErr');
const formErr  = document.getElementById('formErr');
const btn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const btnLabel = document.getElementById('btnLabel');

const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;

function clearErrors(){
  formErr.classList.remove('show'); formErr.textContent='';
  emailErr.textContent=''; passErr.textContent='';
  emailEl.classList.remove('invalid'); passEl.classList.remove('invalid');
}
function showFormError(msg){ formErr.textContent=msg; formErr.classList.add('show'); }
function setLoading(on){
  btn.disabled=on; spinner.style.display=on?'block':'none';
  btnLabel.textContent=on?'Entrando…':'Entrar';
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  clearErrors();
  const email = emailEl.value.trim();
  const password = passEl.value;
  let ok=true;
  if(!EMAIL_RE.test(email)){ emailErr.textContent='Ingresa un correo válido'; emailEl.classList.add('invalid'); ok=false; }
  if(!password){ passErr.textContent='Ingresa tu contraseña'; passEl.classList.add('invalid'); ok=false; }
  if(!ok) return;

  setLoading(true);
  try{
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      credentials:'include', body: JSON.stringify({email, password})
    });
    if(r.ok){ window.location.href='/dashboard'; return; }
    let msg='No fue posible iniciar sesión';
    try{ const d=await r.json(); if(d.detail) msg=d.detail; }catch(_){}
    showFormError(msg);
  }catch(_){
    showFormError('Error de conexión. Inténtalo de nuevo.');
  }finally{
    setLoading(false);
  }
});
</script>
</body>
</html>
