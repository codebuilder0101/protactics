<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios · PROTACTICS</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f; --panel:#0b1120; --border:#1a2d4a;
  --accent:#00e5ff; --accent2:#ff6b35; --accent3:#39ff14; --accent4:#ffd700; --danger:#ff5a5a;
  --text:#c8d8e8; --dim:#4a6580;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px);}
a{color:inherit;text-decoration:none;}

header{background:linear-gradient(180deg,#071525 0%,var(--bg) 100%);border-bottom:1px solid var(--border);
  padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:.8rem;}
.logo svg{width:32px;height:32px;}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--accent);text-shadow:0 0 18px rgba(0,229,255,.4);line-height:1;}
.logo h1 span{display:block;font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:.2em;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:.7rem;}
.btn{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
  padding:.5rem .8rem;border-radius:6px;cursor:pointer;border:1px solid var(--border);transition:all .18s;display:inline-flex;align-items:center;gap:.4rem;background:transparent;color:var(--text);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-logout{border-color:rgba(255,107,53,.3);color:var(--accent2);background:rgba(255,107,53,.08);}
.btn-logout:hover{border-color:var(--accent2);color:var(--accent2);}

.wrap{max-width:1100px;margin:0 auto;padding:2rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;color:#eaf6ff;margin-bottom:.2rem;}
.page-sub{font-size:.85rem;color:var(--dim);margin-bottom:1.6rem;}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1.6rem;}
.panel-title{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}

table{width:100%;border-collapse:collapse;}
th{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
  text-align:left;padding:.6rem .7rem;border-bottom:1px solid var(--border);}
td{padding:.6rem .7rem;border-bottom:1px solid rgba(26,45,74,.5);font-size:.85rem;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.u-email{color:#eaf6ff;font-weight:600;}
.u-id{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--dim);}
.you{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--accent3);border:1px solid rgba(57,255,20,.35);border-radius:4px;padding:.05rem .3rem;margin-left:.4rem;}
.st{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.06em;text-transform:uppercase;border-radius:4px;padding:.1rem .4rem;margin-left:.4rem;}
.st-approved{color:var(--accent3);border:1px solid rgba(57,255,20,.35);background:rgba(57,255,20,.06);}
.st-pending{color:var(--accent4);border:1px solid rgba(255,215,0,.4);background:rgba(255,215,0,.07);}
.st-rejected{color:#ff9b9b;border:1px solid rgba(255,90,90,.35);background:rgba(255,90,90,.06);}

select,input{background:#060b15;border:1px solid var(--border);border-radius:6px;padding:.45rem .55rem;
  color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:.82rem;transition:all .15s;}
select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,.12);}
select:disabled{opacity:.4;cursor:not-allowed;}

.btn-sm{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;
  padding:.45rem .7rem;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.btn-save{background:linear-gradient(135deg,var(--accent),#0bb5cc);color:#02151b;font-weight:600;}
.btn-save:hover{box-shadow:0 0 16px rgba(0,229,255,.4);}
.btn-del{background:rgba(255,90,90,.08);border-color:rgba(255,90,90,.3);color:#ff9b9b;margin-left:.4rem;}
.btn-del:hover{background:rgba(255,90,90,.18);border-color:var(--danger);}
.btn-del:disabled{opacity:.3;cursor:not-allowed;}

.form-grid{display:grid;grid-template-columns:repeat(5,1fr) auto;gap:.7rem;align-items:end;}
.form-grid label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:.3rem;}
.form-grid input,.form-grid select{width:100%;}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:#0b1120;border:1px solid var(--border);border-radius:8px;padding:.7rem 1.2rem;font-size:.85rem;
  transition:all .25s;pointer-events:none;z-index:500;box-shadow:0 10px 30px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(57,255,20,.4);color:var(--accent3);}
.toast.err{border-color:rgba(255,90,90,.4);color:#ff9b9b;}

.empty{color:var(--dim);text-align:center;padding:2rem;font-size:.85rem;}
@media(max-width:820px){
  .form-grid{grid-template-columns:1fr 1fr;}
  table{font-size:.78rem;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 34 34" fill="none">
      <circle cx="17" cy="17" r="15" stroke="#00e5ff" stroke-width="1" opacity=".3"/>
      <circle cx="17" cy="17" r="9"  stroke="#00e5ff" stroke-width="1" opacity=".5"/>
      <circle cx="17" cy="17" r="3.5" stroke="#00e5ff" stroke-width="1"/>
      <circle cx="17" cy="17" r="2" fill="#00e5ff"/>
    </svg>
    <h1>PROTACTICS <span>GESTIÓN DE USUARIOS Y PERMISOS</span></h1>
  </div>
  <div class="hdr-right">
    <a class="btn" href="/admin/approvals">Solicitudes</a>
    <a class="btn" href="/dashboard">← Volver al panel</a>
    <button class="btn btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<div class="wrap">
  <div class="page-title">Usuarios y permisos</div>
  <div class="page-sub">Asigna a cada persona un perfil de acceso y, si aplica, su puerto.</div>

  <!-- Crear usuario -->
  <div class="panel">
    <div class="panel-title">Crear usuario</div>
    <form id="createForm" class="form-grid" novalidate>
      <div><label>Correo</label><input id="c-email" type="email" placeholder="correo@dominio.com" required></div>
      <div><label>Nombre</label><input id="c-nombre" type="text" placeholder="Opcional"></div>
      <div><label>Contraseña</label><input id="c-password" type="password" placeholder="Mínimo 8" required></div>
      <div><label>Perfil</label>
        <select id="c-role">
          <option value="observador">Observador</option>
          <option value="observador_global">Observador global</option>
          <option value="alimentador">Alimentador</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
      <div><label>Puerto</label><select id="c-puerto"></select></div>
      <div><button class="btn-sm btn-save" type="submit">Crear</button></div>
    </form>
  </div>

  <!-- Lista de usuarios -->
  <div class="panel">
    <div class="panel-title">Usuarios registrados</div>
    <table>
      <thead><tr>
        <th>Usuario</th><th>Perfil</th><th>Puerto asignado</th><th style="text-align:right">Acciones</th>
      </tr></thead>
      <tbody id="usersBody">
        <tr><td colspan="4" class="empty">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ROLE_OPTS = [
  {v:'observador',        t:'Observador'},
  {v:'observador_global', t:'Observador global'},
  {v:'alimentador',       t:'Alimentador'},
  {v:'admin',             t:'Administrador'},
];
const SCOPED = new Set(['observador','alimentador']);
let PUERTOS = [];   // [{id, nombre_corto}]
let ME = null;

function toast(msg, ok=true){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok?'ok':'err');
  setTimeout(()=>{ t.className = 'toast'; }, 2600);
}

async function api(path, opts={}){
  const r = await fetch(path, {credentials:'include', headers:{'Content-Type':'application/json'}, ...opts});
  if(r.status === 401){ window.location.href='/login'; throw new Error('No autenticado'); }
  if(r.status === 403){ window.location.href='/dashboard'; throw new Error('Sin permiso'); }
  if(!r.ok){
    let msg = 'Error'; try{ const d=await r.json(); msg = Array.isArray(d.detail)?(d.detail[0]?.msg||msg):(d.detail||msg); }catch(_){}
    throw new Error(msg);
  }
  return r.status === 204 ? null : r.json();
}

function portOptions(selectedId){
  const none = `<option value="">— sin puerto —</option>`;
  return none + PUERTOS.map(p =>
    `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.nombre_corto}</option>`).join('');
}
function roleOptions(selected){
  return ROLE_OPTS.map(o => `<option value="${o.v}" ${o.v===selected?'selected':''}>${o.t}</option>`).join('');
}

function rowTpl(u){
  const isMe = ME && u.id === ME.id;
  const scoped = SCOPED.has(u.role);
  const stLabel = {approved:'Aprobado', pending:'Pendiente', rejected:'Rechazado'}[u.status] || u.status;
  return `<tr data-id="${u.id}">
    <td>
      <div class="u-email">${u.nombre || u.email.split('@')[0]}${isMe?'<span class="you">TÚ</span>':''}<span class="st st-${u.status}">${stLabel}</span></div>
      <div class="u-id">${u.email} · #${u.id}</div>
    </td>
    <td><select class="r-role" onchange="onRoleChange(${u.id})">${roleOptions(u.role)}</select></td>
    <td><select class="r-port" ${scoped?'':'disabled'}>${portOptions(u.puerto_id)}</select></td>
    <td style="text-align:right;white-space:nowrap">
      <button class="btn-sm btn-save" onclick="saveRow(${u.id})">Guardar</button>
      <button class="btn-sm btn-del" onclick="delRow(${u.id})" ${isMe?'disabled title="No puedes eliminarte"':''}>Eliminar</button>
    </td>
  </tr>`;
}

function onRoleChange(id){
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const role = tr.querySelector('.r-role').value;
  const port = tr.querySelector('.r-port');
  if (SCOPED.has(role)){ port.disabled = false; }
  else { port.disabled = true; port.value = ''; }
}

async function saveRow(id){
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const role = tr.querySelector('.r-role').value;
  const portVal = tr.querySelector('.r-port').value;
  const puerto_id = portVal === '' ? null : Number(portVal);
  if (SCOPED.has(role) && puerto_id === null){
    toast('Este perfil necesita un puerto asignado', false); return;
  }
  try{
    await api(`/api/auth/users/${id}`, {method:'PATCH', body: JSON.stringify({role, puerto_id})});
    toast('Cambios guardados');
    await loadUsers();
  }catch(e){ toast(e.message, false); }
}

async function delRow(id){
  if(!confirm('¿Eliminar este usuario? Esta acción no se puede deshacer.')) return;
  try{
    await api(`/api/auth/users/${id}`, {method:'DELETE'});
    toast('Usuario eliminado');
    await loadUsers();
  }catch(e){ toast(e.message, false); }
}

async function loadUsers(){
  const users = await api('/api/auth/users');
  const body = document.getElementById('usersBody');
  body.innerHTML = users.length ? users.map(rowTpl).join('')
    : `<tr><td colspan="4" class="empty">No hay usuarios.</td></tr>`;
}

document.getElementById('createForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('c-email').value.trim();
  const nombre = document.getElementById('c-nombre').value.trim();
  const password = document.getElementById('c-password').value;
  const role = document.getElementById('c-role').value;
  const portVal = document.getElementById('c-puerto').value;
  const puerto_id = portVal === '' ? null : Number(portVal);
  if (SCOPED.has(role) && puerto_id === null){ toast('Este perfil necesita un puerto', false); return; }
  try{
    await api('/api/auth/users', {method:'POST', body: JSON.stringify({email, nombre, password, role, puerto_id})});
    toast('Usuario creado');
    e.target.reset();
    syncCreatePort();
    await loadUsers();
  }catch(err){ toast(err.message, false); }
});

function syncCreatePort(){
  const role = document.getElementById('c-role').value;
  document.getElementById('c-puerto').disabled = !SCOPED.has(role);
}
document.getElementById('c-role').addEventListener('change', syncCreatePort);

async function init(){
  try{
    ME = await api('/api/auth/me');
    if (ME.role !== 'admin'){ window.location.href='/dashboard'; return; }
    PUERTOS = await api('/puertos');
    document.getElementById('c-puerto').innerHTML = portOptions(null);
    syncCreatePort();
    await loadUsers();
  }catch(e){ /* api() ya redirige en 401/403 */ }
}

async function logout(){
  try{ await fetch('/api/auth/logout', {method:'POST', credentials:'include'}); }catch(_){}
  window.location.href = '/';
}

init();
</script>
</body>
</html>
