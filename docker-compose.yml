version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: protactics
      POSTGRES_USER: protactics
      POSTGRES_PASSWORD: protactics123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://protactics:protactics123@db:5432/protactics
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
